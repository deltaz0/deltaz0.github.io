---
layout: default
---
<h1>Blog</h1>
<div class="postselector">
<ul class="posts">
	  {% for blog in site.categories.blogs %}
	    <li><span>{{ blog.date | date_to_string }}</span> » <a href="{{ blog.url }}" title="{{ blog.title }}">{{ blog.title }}</a></li>
	  {% endfor %}
	</ul>
</div>
<p>{{ page.date | date_to_string }} » <b>{{ page.title }}</b></p>

{{ content }}
