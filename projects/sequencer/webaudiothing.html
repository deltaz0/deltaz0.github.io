function run(){
        var curr = globals.colSelected + 1;
        var prev = curr - 1;
        if(prev <= 0){
            prev = globals.numColumns;
        }
        $('tr td:nth-child('+curr+')').addClass("selected");
        var trs = document.getElementsByTagName("tr");
        var init = new Date().getTime();
        var ids = [];
        for(var i = 0; i < trs.length; i++){
            if(trs[i].getElementsByTagName("td")[curr-1].className.match(/(^| )play( |$)/)){
                ids.push(i);
            }
        }
        
        for(i in ids){
			//document.write("<p>" + ids[i] + "</p>");
			//document.getElementById(i.toString()).play();
			document.getElementById(ids[i]).play();
            //soundManager.play(ids[i], {volume: globals.volume});
        }

        var offset = new Date().getTime() - init;
        $('tr td:nth-child('+prev+')').removeClass("selected");
        globals.colSelected = curr % globals.numColumns;
        globals.clockTimer = setTimeout(run, globals.interval - offset);

function convert() {
  var output=document.getElementById("ti2");  
  var input=document.getElementById("ti1").value;
    output.value = "";
	
    for (i=0; i < 8; i++) {
		output.value += input[i].charCodeAt(0).toString(2);
		var tmpString = input[i].charCodeAt(0).toString(2);
		for(j=0; j < 8; j++){
			var trsa = document.getElementsByTagName("tr");
			var thing = trsa[Math.floor(i/2)].getElementsByTagName("td");
			/*j+((i*8)%16)*/
			$(thing[j+((i*8)%16)]).removeClass('play');
			if(tmpString.charAt(j) == '1'){
				$(thing[j+((i*8)%16)]).toggleClass('play');
			}
			//output.value +=input[i].charCodeAt(0).toString(2) + " ";
		}
    }
}

<script type="text/javascript">
$(".vol_knob").knob({
min : 0, 
max : 100, 
step : 1, 
angleOffset : 180, 
angleArc : 360, 
stopper : true, 
readOnly : false, 
cursor : false,  
lineCap : 'butt', 
thickness : '0.7', 
width : 30, 
displayInput : false, 
displayPrevious : true, 
fgColor : '#12F7FF', 
inputColor : '#12F7FF', 
font : 'Arial', 
fontWeight : 'normal', 
bgColor : '#6A6A6A', 
draw : function () {
if(this.$.data('skin') == 'tron') {
var a = this.angle(this.cv)  // Angle
, sa = this.startAngle          // Previous start angle
, sat = this.startAngle         // Start angle
, ea                            // Previous end angle
, eat = sat + a                 // End angle
, r = 1;
this.g.lineWidth = this.lineWidth;
this.o.cursor
&& (sat = eat - 0.3)
&& (eat = eat + 0.3);
if (this.o.displayPrevious) {
ea = this.startAngle + this.angle(this.v);
this.o.cursor
&& (sa = ea - 0.3)
&& (ea = ea + 0.3);
this.g.beginPath();
this.g.strokeStyle = this.pColor;
this.g.arc(this.xy, this.xy, this.radius - this.lineWidth, sa, ea, false);
this.g.stroke();
}
this.g.beginPath();
this.g.strokeStyle = r ? this.o.fgColor : this.fgColor ;
this.g.arc(this.xy, this.xy, this.radius - this.lineWidth, sat, eat, false);
this.g.stroke();
this.g.lineWidth = 2;
this.g.beginPath();
this.g.strokeStyle = this.o.fgColor;
this.g.arc( this.xy, this.xy, this.radius - this.lineWidth + 1 + this.lineWidth * 2 / 3, 0, 2 * Math.PI, false);
this.g.stroke();
return false;
}
}
});

</script>
